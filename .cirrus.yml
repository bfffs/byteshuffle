common: &COMMON
  env:
    RUSTFLAGS: -Dwarnings
    RUSTDOCFLAGS: -Dwarnings
  cargo_cache:
    folder: $CARGO_HOME/registry
    fingerprint_script: cat Cargo.lock || echo ""
  build_script:
    - cargo build $CARGO_ARGS
  doc_script:
    - cargo doc $CARGO_ARGS --no-deps


task:
  name: MSRV
  container:
    image: rust:1.89.0
  << : *COMMON
  before_cache_script: rm -rf $CARGO_HOME/registry/index

task:
  name: stable
  container:
    image: rust:latest
  << : *COMMON
  test_script:
    # Use --all-targets to run the benchmarks in test mode
    - cargo test $CARGO_ARGS --all-targets
  before_cache_script: rm -rf $CARGO_HOME/registry/index

task:
  name: nightly
  container:
    image: rustlang/rust:nightly
  env:
    CARGO_ARGS: --all-features
  << : *COMMON
  test_script:
    # Use --all-targets to run the benchmarks in test mode
    - cargo test $CARGO_ARGS --all-targets
  lint_script:
    - rustup component add clippy
    - cargo clippy $CARGO_ARGS --all-targets -- -D warnings
  minver_script:
    - cargo update -Zdirect-minimal-versions
    - cargo test $CARGO_ARGS --all-targets
  before_cache_script: rm -rf $CARGO_HOME/registry/index
